# ---------------------------------------------------------------------------
# Traffic Monitoring – Livestream Pipeline
#
# Services:
#   kafka            – KRaft-mode Kafka (confluentinc/cp-kafka 7.6.0, NO Zookeeper)
#   kafka-init       – One-shot topic creator
#   tracking-papagou – CV detection + speed from I/C Papagou (cam231)
#   tracking-roupaki – CV detection + speed from Roupaki Toll Station (cam88)
#   spark-analytics  – PySpark Structured Streaming: Q1-Q3, Q5-Q6
#   spark-alerts     – Lightweight kafka-python consumer (Q4: >130 km/h)
#
# KRaft mode eliminates Zookeeper entirely — no more session-timeout crashes.
# Data persisted to shared SQLite at /data/db/traffic.db (volume: db-data).
# ---------------------------------------------------------------------------

networks:
  traffic-net:
    driver: bridge

volumes:
  db-data:     # shared SQLite database volume

services:

  # ── Kafka — KRaft mode (no Zookeeper) ──────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    networks: [traffic-net]
    ports:
      - "9092:9092"   # host access for debugging
    environment:
      # ── KRaft identity ────────────────────────────────────────────────────
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"

      # ── Listeners ─────────────────────────────────────────────────────────
      #   PLAINTEXT      → internal docker traffic  (port 29092)
      #   CONTROLLER     → KRaft controller         (port 9093)
      #   PLAINTEXT_HOST → host-machine access       (port 9092)
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"

      # ── Broker settings ───────────────────────────────────────────────────
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 24

      # ── KRaft requires a stable cluster ID ───────────────────────────────
      # Generate once with:  kafka-storage random-uuid
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:29092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 45s

  # ── Topic Initialiser (one-shot) ────────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    networks: [traffic-net]
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic traffic-stats   --partitions 8  --replication-factor 1 &&
       kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic traffic-alerts  --partitions 2  --replication-factor 1 &&
       echo '=== Topics ready ===' &&
       kafka-topics --bootstrap-server kafka:29092 --list"
    restart: "no"

  # ── Tracking: I/C Papagou (Imittos Ring Road) — cam231 ─────────────────────
  tracking-papagou:
    build:
      context: .
      dockerfile: Tracking/Dockerfile
    container_name: tracking-papagou
    networks: [traffic-net]
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - db-data:/data/db
    environment:
      INPUT_VIDEO: "cam231"
      CAMERA_NAME: "IC_Papagou"
      KAFKA_BOOTSTRAP: kafka:29092
      KAFKA_TOPIC_STATS: traffic-stats
      KAFKA_TOPIC_ALERTS: traffic-alerts
      ALERT_SPEED_KMH: "130"
      DB_PATH: "/data/db/traffic.db"
      # ── Geometry (1280×720 stream, side-mounted camera)
      SPLIT_COORD: "640"
      LINE_L1_COORD: "590"
      LINE_L2_COORD: "80"
      LINE_R1_COORD: "690"
      LINE_R2_COORD: "1200"
      DIST_REAL_M: "28.0"
      PIXELS_PER_METER: "16.0"
      LANE_LEFT_LABEL: "to_Katechaki"
      LANE_RIGHT_LABEL: "to_Mesogeia_Vrilissia"
    command: ["python", "-u", "monitor_traffic.py"]
    restart: unless-stopped

  # ── Tracking: Roupaki Toll Station — cam88 ──────────────────────────────────
  tracking-roupaki:
    build:
      context: .
      dockerfile: Tracking/Dockerfile
    container_name: tracking-roupaki
    networks: [traffic-net]
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - db-data:/data/db
    environment:
      INPUT_VIDEO: "cam88"
      CAMERA_NAME: "Roupaki_Toll_Station"
      KAFKA_BOOTSTRAP: kafka:29092
      KAFKA_TOPIC_STATS: traffic-stats
      KAFKA_TOPIC_ALERTS: traffic-alerts
      ALERT_SPEED_KMH: "130"
      DB_PATH: "/data/db/traffic.db"
      # ── Geometry (1280×720 stream, elevated side view)
      SPLIT_COORD: "640"
      LINE_L1_COORD: "570"
      LINE_L2_COORD: "60"
      LINE_R1_COORD: "710"
      LINE_R2_COORD: "1210"
      DIST_REAL_M: "30.0"
      PIXELS_PER_METER: "15.0"
      LANE_LEFT_LABEL: "to_Elefsina"
      LANE_RIGHT_LABEL: "to_Athens_Airport"
    command: ["python", "-u", "monitor_traffic.py"]
    restart: unless-stopped

  # ── Spark Analytics — local[*] mode (Q1-Q3, Q5, Q6) ─────────────────────────
  spark-analytics:
    build:
      context: .
      dockerfile: Spark/Dockerfile
    container_name: spark-analytics
    networks: [traffic-net]
    restart: on-failure
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      KAFKA_TOPIC_STATS: traffic-stats
      SPARK_MASTER: "local[*]"
    command:
      - /opt/spark/bin/spark-submit
      - --master
      - local[*]
      - /app/analytics.py

  # ── Real-Time Alerts Consumer (Q4: >130 km/h) ───────────────────────────────
  spark-alerts:
    build:
      context: .
      dockerfile: Spark/Dockerfile
    container_name: spark-alerts
    networks: [traffic-net]
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - db-data:/data/db
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      KAFKA_TOPIC_ALERTS: traffic-alerts
      ALERT_SPEED_KMH: "130"
      DB_PATH: "/data/db/traffic.db"
    command: ["python3", "/app/alerts_consumer.py"]
    restart: unless-stopped
